---

name: Spring Data Redis Integration Test

on:
  pull_request:
    branches:
      - main
      - '[0-9].*'
  workflow_dispatch:
    inputs:
      spring_data_redis_branch:
        description: 'Spring Data Redis branch to test against'
        required: false
        default: 'main'
      redis_version:
        description: 'Redis version (6, 7, 8)'
        required: false
        default: '8'

jobs:
  integration-test:
    name: SDR Integration Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Lettuce
        uses: actions/checkout@v4
        with:
          path: lettuce

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Lettuce (skip tests)
        working-directory: lettuce
        run: |
          mvn -B clean install -DskipTests -Dgpg.skip=true
          LETTUCE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "LETTUCE_VERSION=$LETTUCE_VERSION" >> $GITHUB_ENV
          echo "Built Lettuce version: $LETTUCE_VERSION"

      - name: Checkout Spring Data Redis
        uses: actions/checkout@v4
        with:
          repository: spring-projects/spring-data-redis
          ref: ${{ github.event.inputs.spring_data_redis_branch || 'main' }}
          path: spring-data-redis

      - name: Patch Spring Data Redis to use local Lettuce
        working-directory: spring-data-redis
        run: |
          echo "Patching Spring Data Redis to use Lettuce version: $LETTUCE_VERSION"
          mvn versions:set-property -Dproperty=lettuce -DnewVersion=$LETTUCE_VERSION -DgenerateBackupPoms=false

      - name: Build Spring Data Redis
        working-directory: spring-data-redis
        run: |
          # Verify Lettuce changes do not cause compile-time issues in SDR
          ./mvnw -B clean test-compile \
            -Dmaven.javadoc.skip=true \
            -Pci

      - name: Run Spring Data Redis unit tests
        working-directory: spring-data-redis
        run: |
          # Verify Lettuce changes do not break SDR unit tests (no Redis required)
          ./mvnw -B test \
            -Dtest="**/lettuce/**/*UnitTests,**/lettuce/**/*UnitTest" \
            -DfailIfNoTests=false \
            -Dmaven.javadoc.skip=true \
            -Pci

      - name: Setup Redis using SDR infrastructure
        working-directory: spring-data-redis
        run: |
          mkdir -p work
          make start
        env:
          IMAGE: redis:${{ github.event.inputs.redis_version || '8' }}

      - name: Run Spring Data Redis integration tests
        working-directory: spring-data-redis
        run: |
          # Verify Lettuce changes do not break SDR integration tests (Redis required)
          ./mvnw -B test \
            -Dtest="**/lettuce/**/*Tests,**/lettuce/**/*Test,!**/lettuce/**/*UnitTests,!**/lettuce/**/*UnitTest" \
            -DfailIfNoTests=false \
            -Dmaven.javadoc.skip=true \
            -Pci

      - name: Cleanup Redis
        if: always()
        working-directory: spring-data-redis
        run: make clean || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdr-test-results
          path: |
            spring-data-redis/target/surefire-reports/
          retention-days: 7
