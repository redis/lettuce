name: Benchmarks
on:
#  push:
#    paths-ignore:
#      - 'docs/**'
#      - '**/*.md'
#      - '**/*.rst'
#    branches:
#      - main
#      - '[0-9].*'
#  pull_request:
#    branches:
#      - main
#      - '[0-9].*'
  schedule:
    - cron: '0 1 * * *' # nightly build
  workflow_dispatch:

#permissions:
  # For commenting alerts on commits
  # contents: write

jobs:

  benchmark:
    name: Execute benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Setup Maven
        uses: s4u/setup-maven-action@6c4e9964d4ecb8f1026310cd8618791fd51a8016 # v1.19.0
        with:
          java-version: 8
          java-distribution: temurin
      - name: Install missing dependencies to container
        run: |
          sudo apt update
      - name: Set up Docker Compose environment
        run: |
          mkdir -m 777 $REDIS_ENV_WORK_DIR
          make start
        env:
          REDIS_ENV_WORK_DIR: ${{ github.workspace }}/work
      - name: Maven offline
        run: |
          mvn -q dependency:go-offline
      - name: Run benchmarks
        run: |
          mvn -Pjmh clean test
        env:
          JVM_OPTS: -Xmx3200m
          TERM: dumb
      - name: Tear down Docker Compose environment
        run: |
          docker compose $COMPOSE_ENV_FILES -f src/test/resources/docker-env/docker-compose.yml down
      # Download previous benchmark result from cache (if exists)
      - name: Download previous benchmark data
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark
      # Run `github-action-benchmark` action
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tool: 'jmh'
          auto-push: true
          gh-repository: 'github.com/redis/lettuce'
          gh-pages-branch: 'main'
          benchmark-data-dir-path: './docs/static/benchmarks'
          output-file-path: benchmarks.json
          fail-on-alert: false
          alert-threshold: '200%'
          alert-comment-cc-users: '@tishun'
          # comment-on-alert: true
