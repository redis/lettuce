port 7480
tls-port 7444
save ""
appendonly no
cluster-enabled yes
cluster-node-timeout 150
cluster-announce-tls-port 7444
requirepass foobared
masterauth foobared

# ACL users for mTLS auto-auth (Docker image enables tls-auth-clients-user CN by default)
user Client-test-cert on nopass ~* &* +@all
user Client-test-2 on nopass ~* &* +@all