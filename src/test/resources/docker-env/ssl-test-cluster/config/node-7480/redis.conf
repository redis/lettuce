port 7480
tls-port 7444
save ""
appendonly no
cluster-enabled yes
cluster-node-timeout 150
cluster-announce-tls-port 7444
requirepass foobared
masterauth foobared

# Enable mTLS auto-auth: authenticate client based on certificate CN
tls-auth-clients-user CN

# mTLS auto-auth: ACL users matching client certificate CNs
# Available certificates from Docker image:
#   - Client-test-cert.p12 (CN=Client-test-cert, lowercase t) -> USER_1
#   - Client-test-2.p12 (CN=Client-test-2) -> USER_2
#   - client.p12 (CN=Client-Test-cert, uppercase T) -> NO ACL (case mismatch for auth failure tests)
# Note: Redis ACL usernames are case-sensitive
user Client-test-cert on nopass ~* &* +@all
user Client-test-2 on nopass ~* &* +@all